services:
  mysql:
    image: mysql:8.0
    container_name: mysql-ventas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-ventas-data:/var/lib/mysql
    networks:
      - ventas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    image: hapema/innovatech-ventas:latest
    container_name: backend-ventas
    restart: always
    ports:
      - "8082:8082"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ventas-network

volumes:
  mysql-ventas-data:
    name: ventas-mysql-data

networks:
  ventas-network:
    driver: bridge
